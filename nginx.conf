# ============================================================================
# /etc/nginx/sites-available/forum.ylamanager.ru
#
# Установка:
#   sudo cp nginx.conf /etc/nginx/sites-available/forum.ylamanager.ru
#   sudo ln -sf /etc/nginx/sites-available/forum.ylamanager.ru \
#               /etc/nginx/sites-enabled/forum.ylamanager.ru
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Потом SSL:
#   sudo certbot --nginx -d forum.ylamanager.ru
# ============================================================================

# Ограничение числа запросов — защита от DDoS/брутфорса
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# HTTP → HTTPS редирект (certbot добавит ssl-блок автоматически)
server {
    listen 80;
    listen [::]:80;
    server_name forum.ylamanager.ru;

    # Корень статических файлов — Nginx раздаёт их сам, без Node.js
    root /var/www/meridian/client;
    index index.html;

    # ── Gzip-сжатие ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json image/svg+xml;

    # ── Загрузка аватаров и иконок (статика с длинным кэшем) ─────────
    location /uploads/ {
        alias /var/www/meridian/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        # Ограничение размера ответа — безопасность
        try_files $uri =404;
    }

    location /icons/ {
        alias /var/www/meridian/client/icons/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── CSS, JS, шрифты — кэш 7 дней ─────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # ── Изображения — кэш 30 дней ────────────────────────────────────
    location ~* \.(png|jpg|jpeg|webp|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── API — проксируем на Node.js ───────────────────────────────────
    # Rate-limit на auth-маршруты (логин/регистрация) — защита от брутфорса
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        client_max_body_size 1m;
    }

    location /api/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        # Загрузка аватаров — до 10 МБ
        client_max_body_size 10m;
    }

    # ── Все HTML-страницы — раздаёт Nginx, без Node.js ───────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Скрыть версию Nginx
    server_tokens off;
}
