# ============================================================================
# /etc/nginx/sites-available/forum.ylamanager.ru
# Nginx — обратный прокси перед Node.js-сервером форума.
#
# Как установить:
#   sudo cp nginx.conf /etc/nginx/sites-available/forum.ylamanager.ru
#   sudo ln -s /etc/nginx/sites-available/forum.ylamanager.ru \
#              /etc/nginx/sites-enabled/forum.ylamanager.ru
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# --- HTTP → HTTPS редирект (заполняется после получения SSL через certbot) ---
server {
    listen 80;
    listen [::]:80;
    server_name forum.ylamanager.ru;

    # Certbot автоматически добавит сюда строки при выпуске сертификата.
    # До этого — просто проксируем напрямую без SSL (для первичной проверки).

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

