<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Кровавый Меридиан</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="auth-wrap">
    <div class="card auth-card">
      <h1>С возвращением</h1>
      <p class="sub">Войдите, чтобы продолжить путь по «Кровавому Меридиану»</p>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email или никнейм</label>
          <input class="form-input" type="text" id="login-field" placeholder="ваш@email.com или Никнейм" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="flex-between" style="margin-bottom:22px;">
          <label class="checkbox-row">
            <input type="checkbox" id="remember-me" checked>
            Запомнить меня
          </label>
          <a href="forgot-password.html" style="font-size:13px;color:var(--cyan);font-weight:600;">Забыли пароль?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-submit">Войти</button>
      </form>

      <div class="auth-foot">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="app.js"></script>
<script src="js/login.js"></script>
</body>
</html>
