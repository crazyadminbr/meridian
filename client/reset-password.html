<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новый пароль — Кровавый Меридиан</title>
<link rel="preload" href="style.css" as="style">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="auth-wrap">
    <div class="card auth-card" id="reset-box">
      <h1>Новый пароль</h1>
      <p class="sub">Придумайте новый пароль для входа</p>

      <form id="reset-form">
        <div class="form-group">
          <label class="form-label">Новый пароль</label>
          <input class="form-input" type="password" id="reset-password" placeholder="Минимум 6 символов" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Повторите пароль</label>
          <input class="form-input" type="password" id="reset-password2" placeholder="Повторите пароль" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="reset-submit">Сохранить пароль</button>
      </form>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="app.js" defer></script>
<script src="js/reset.js" defer></script>
</body>
</html>
