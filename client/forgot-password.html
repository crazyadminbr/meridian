<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Восстановление пароля — Кровавый Меридиан</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="auth-wrap">
    <div class="card auth-card" id="forgot-box">
      <h1>Восстановление пароля</h1>
      <p class="sub">Укажите email — мы отправим ссылку для сброса пароля</p>

      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="forgot-email" placeholder="ваш@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="forgot-submit">Отправить ссылку</button>
      </form>

      <div class="auth-foot"><a href="login.html">← Вернуться ко входу</a></div>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="app.js"></script>
<script src="js/forgot.js"></script>
</body>
</html>
